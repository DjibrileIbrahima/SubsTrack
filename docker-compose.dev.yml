
# Development mode — only runs the DB
# Backend and frontend run locally with hot reload
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:16
    container_name: substrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: substrack
      POSTGRES_PASSWORD: substrack_password
      POSTGRES_DB: substrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
