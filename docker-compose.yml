version: "3.8"

# Production mode — runs all 3 services in containers
#
# Usage:
#   docker compose up --build

services:
  db:
    image: postgres:16
    container_name: substrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: substrack
      POSTGRES_PASSWORD: substrack_password
      POSTGRES_DB: substrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: substrack_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://substrack:substrack_password@db:5432/substrack

  frontend:
    build: ./frontend
    container_name: substrack_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
